name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Validate Python files compile
        run: |
          python -m py_compile dashboard/chatbot.py
          python -m py_compile dashboard/app.py
          python -m py_compile scripts/process_data.py

      - name: Run tests
        run: pytest

      - name: Regenerate processed dataset
        run: python scripts/process_data.py

      - name: Validate generated dataset
        run: |
          python -c "from pathlib import Path; import pandas as pd; path = Path('data/processed/deporte_data/anio=2023/hechos_indicadores.parquet'); assert path.exists(), f'Missing file: {path}'; df = pd.read_parquet(path); expected = {'CCAA', 'Gasto_Promedio_Hogar_Eur', 'Licencias_Federadas', 'Poblacion_Activa_Dep', 'anio', 'fuente'}; missing = expected.difference(df.columns); assert not missing, f'Missing columns: {sorted(missing)}'; assert len(df) == 17, f'Unexpected row count: {len(df)}'"
